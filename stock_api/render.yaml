services:
  - type: web
    name: back-gestionstock
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommande: gunicorn stock_api.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: back-gestion.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://mokonziplus.vercel.app